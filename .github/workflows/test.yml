name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - Checkout code
      - Set up Go 1.24
      - Install dependencies
      - Build the project
      - Run unit tests (go test ./...)
      - Run integration tests (make integration)
