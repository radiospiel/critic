name: Build

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  PROTOC_GEN_GO_VERSION: v1.36.11
  PROTOC_GEN_CONNECT_GO_VERSION: v1.19.1

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true

      - name: Cache protoc
        id: cache-protoc
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/protoc
          key: protoc-${{ runner.os }}-v29.4

      - name: Install protoc
        if: steps.cache-protoc.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Cache buf
        id: cache-buf
        uses: actions/cache@v4
        with:
          path: /usr/local/bin/buf
          key: buf-${{ runner.os }}-latest

      - name: Install buf
        if: steps.cache-buf.outputs.cache-hit != 'true'
        run: |
          curl -sSL "https://github.com/bufbuild/buf/releases/latest/download/buf-Linux-x86_64" -o /tmp/buf
          sudo install -m 755 /tmp/buf /usr/local/bin/buf

      - name: Cache Go protoc plugins
        id: cache-protoc-plugins
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin/protoc-gen-go
            ~/go/bin/protoc-gen-connect-go
          key: protoc-plugins-${{ runner.os }}-${{ env.PROTOC_GEN_GO_VERSION }}-${{ env.PROTOC_GEN_CONNECT_GO_VERSION }}

      - name: Install protoc-gen-go
        if: steps.cache-protoc-plugins.outputs.cache-hit != 'true'
        run: go install google.golang.org/protobuf/cmd/protoc-gen-go@${{ env.PROTOC_GEN_GO_VERSION }}

      - name: Install protoc-gen-connect-go
        if: steps.cache-protoc-plugins.outputs.cache-hit != 'true'
        run: go install connectrpc.com/connect/cmd/protoc-gen-connect-go@${{ env.PROTOC_GEN_CONNECT_GO_VERSION }}

      - name: Generate proto files
        run: make proto

      - name: Build
        run: go build -o critic ./src/cmd

      - name: Unit Tests
        run: make unit-tests

      - name: Integration Tests
        run: make -C tests/integration/
