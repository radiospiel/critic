<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <script>
        // Set theme immediately to avoid flash
        document.documentElement.setAttribute('data-theme', localStorage.getItem('critic-theme') || 'dark');
    </script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/htmx-ext-ws@2.0.2/ws.js"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body hx-ext="ws" ws-connect="/ws">
    <div class="container">
        <header class="header">
            <h1>Critic</h1>
            <div class="header-controls">
                <button class="theme-toggle" onclick="toggleTheme()">
                    <span class="theme-icon"></span>
                </button>
            </div>
        </header>

        <div class="main-layout">
            <aside class="sidebar">
                <h2>Files</h2>
                <div id="file-list" hx-get="/api/files" hx-trigger="load, ws:update">
                    {{template "filelist.html" .Files}}
                </div>
            </aside>

            <main class="content">
                <div id="diff-view" class="diff-container">
                    <div class="empty-state">
                        <p>Select a file from the list to view its diff</p>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script>
        // WebSocket message handler
        document.body.addEventListener('ws:message', function(event) {
            const data = JSON.parse(event.detail.message);
            if (data.type === 'conversation' || data.type === 'file') {
                // Trigger refresh of the current view
                htmx.trigger('#file-list', 'refresh');
                const diffView = document.getElementById('diff-view');
                if (diffView.dataset.filePath) {
                    htmx.ajax('GET', '/api/diff/' + diffView.dataset.filePath, {target: '#diff-view'});
                }
            }
        });

        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('critic-theme', newTheme);
        }

        // Load saved theme
        document.addEventListener('DOMContentLoaded', function() {
            const savedTheme = localStorage.getItem('critic-theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        });

        // File selection
        function selectFile(path) {
            document.querySelectorAll('.file-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            const diffView = document.getElementById('diff-view');
            diffView.dataset.filePath = path;
            htmx.ajax('GET', '/api/diff/' + path, {target: '#diff-view'});
        }
    </script>
</body>
</html>
