# Critic configuration file
# Code review tool for Git repositories

# API server settings
server:
  port: 65432
  # dev: false  # Enable development mode with Vite hot reload

# Logging configuration
log:
  level: info  # debug, info, warn, error

# Database settings
database:
  # path: .critic.db  # SQLite database location (relative to git root)

# Diff settings
diff:
  # bases: []        # Default base references for comparison
  # paths: []        # File path patterns to include
  # extensions: []   # File extensions to include (uses built-in defaults if empty)

# UI settings
ui:
  shift_arrow_jump_size: 10  # Lines to jump with Shift+Up/Down
