syntax = "proto3";

package critic.v1;

option go_package = "github.com/radiospiel/critic/src/api;api";

// CriticService provides API methods for the critic code review tool.
service CriticService {
  // GetLastChange returns the timestamp of the last change.
  rpc GetLastChange(GetLastChangeRequest) returns (GetLastChangeResponse);
  // GetDiffSummary returns the current diff summary (file list without hunks) and state.
  rpc GetDiffSummary(GetDiffSummaryRequest) returns (GetDiffSummaryResponse);
  // GetDiff returns the full diff for a specific file path.
  rpc GetDiff(GetDiffRequest) returns (GetDiffResponse);
}

// ErrorCode represents the type of RPC error.
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_INVALID_ARGUMENT = 1;
  ERROR_CODE_NOT_FOUND = 2;
  ERROR_CODE_INTERNAL = 3;
  ERROR_CODE_UNAVAILABLE = 4;
}

// RpcError represents a structured error response.
message RpcError {
  // code is the error type.
  ErrorCode code = 1;
  // message is the error message for logs.
  string message = 2;
  // details is an optional human-readable description.
  string details = 3;
}

// GetLastChangeRequest is an empty request for GetLastChange.
message GetLastChangeRequest {}

// GetLastChangeResponse contains the timestamp of the last change.
message GetLastChangeResponse {
  // mtime_msecs is the timestamp in milliseconds since Unix epoch.
  uint64 mtime_msecs = 1;
  // error contains error details if the request failed.
  RpcError error = 15;
}

// GetDiffSummaryRequest is an empty request for GetDiffSummary.
message GetDiffSummaryRequest {}

// GetDiffSummaryResponse contains the current state and diff summary from the session.
message GetDiffSummaryResponse {
  // state is the current session state ("INITIALISING" or "READY").
  string state = 1;
  // diff contains the file summaries without hunks (may be null if state is INITIALISING).
  DiffSummary diff = 2;
  // error contains error details if the request failed.
  RpcError error = 15;
}

// GetDiffRequest requests the full diff for a specific file.
message GetDiffRequest {
  // path is the file path to get the diff for.
  string path = 1;
}

// GetDiffResponse contains the full diff for a single file.
message GetDiffResponse {
  // file contains the full file diff with hunks.
  FileDiff file = 1;
  // error contains error details if the request failed.
  RpcError error = 15;
}

// DiffSummary represents a git diff summary with file metadata but no hunks.
message DiffSummary {
  repeated FileSummary files = 1;
}

// FileSummary represents metadata about a changed file (without hunks).
message FileSummary {
  string old_path = 1;
  string new_path = 2;
  string file_mode_old = 3;
  string file_mode_new = 4;
  FileStatus status = 5;
  bool is_binary = 6;
}

// Diff represents a git diff with multiple file changes.
message Diff {
  repeated FileDiff files = 1;
}

// FileStatus represents the status of a file in a diff.
enum FileStatus {
  FILE_STATUS_UNSPECIFIED = 0;
  FILE_STATUS_MODIFIED = 1;
  FILE_STATUS_NEW = 2;
  FILE_STATUS_DELETED = 3;
  FILE_STATUS_RENAMED = 4;
}

// FileDiff represents changes to a single file.
message FileDiff {
  string old_path = 1;
  string new_path = 2;
  string file_mode_old = 3;
  string file_mode_new = 4;
  FileStatus status = 5;
  bool is_binary = 6;
  repeated Hunk hunks = 7;
}

// Hunk represents a chunk of changes within a file.
message Hunk {
  int32 old_start = 1;
  int32 old_lines = 2;
  int32 new_start = 3;
  int32 new_lines = 4;
  string header = 5;
  repeated Line lines = 6;
  HunkStats stats = 7;
}

// HunkStats holds line statistics for a hunk.
message HunkStats {
  int32 added = 1;
  int32 deleted = 2;
}

// LineType represents the type of a line in a diff.
enum LineType {
  LINE_TYPE_UNSPECIFIED = 0;
  LINE_TYPE_CONTEXT = 1;
  LINE_TYPE_ADDED = 2;
  LINE_TYPE_DELETED = 3;
}

// Line represents a single line in a diff hunk.
message Line {
  LineType type = 1;
  string content = 2;
  int32 line_no_old = 3;
  int32 line_no_new = 4;
}
