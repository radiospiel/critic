syntax = "proto3";

package critic.v1;

option go_package = "github.com/radiospiel/critic/src/api;api";

// CriticService provides API methods for the critic code review and MCP server tool.
service CriticService {
  // GetLastChange returns the timestamp of the last change.
  rpc GetLastChange(GetLastChangeRequest) returns (GetLastChangeResponse);
  // GetDiffSummary returns the current diff summary (file list without hunks) and state.
  rpc GetDiffSummary(GetDiffSummaryRequest) returns (GetDiffSummaryResponse);
  // GetDiff returns the full diff for a specific file path.
  rpc GetDiff(GetDiffRequest) returns (GetDiffResponse);
  // GetFile returns the content of a file at a specific path.
  rpc GetFile(GetFileRequest) returns (GetFileResponse);
  // CreateConversation creates a new conversation (comment thread) on a diff line.
  rpc CreateConversation(CreateConversationRequest) returns (CreateConversationResponse);
  // GetConversations returns conversations matching the given filters.
  // If paths is empty, returns conversations across all files.
  // If statuses is empty, returns conversations with any status.
  rpc GetConversations(GetConversationsRequest) returns (GetConversationsResponse);
  // GetConversationsSummary returns conversation counts and status per file path.
  rpc GetConversationsSummary(GetConversationsSummaryRequest) returns (GetConversationsSummaryResponse);
  // ReplyToConversation adds a reply message to an existing conversation.
  rpc ReplyToConversation(ReplyToConversationRequest) returns (ReplyToConversationResponse);
  // MarkConversationAs updates the status of a conversation (resolve, unresolve, archive).
  rpc MarkConversationAs(MarkConversationAsRequest) returns (MarkConversationAsResponse);
  // GetDiffBases returns available diff bases and the current one.
  rpc GetDiffBases(GetDiffBasesRequest) returns (GetDiffBasesResponse);
  // SetDiffBase sets the current diff base.
  rpc SetDiffBase(SetDiffBaseRequest) returns (SetDiffBaseResponse);
  // WatchFile tells the server to watch a specific file for changes.
  rpc WatchFile(WatchFileRequest) returns (WatchFileResponse);
  // GetConfig returns server configuration for the frontend.
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);
  // GetRootConversation returns the root conversation (global announcements).
  rpc GetRootConversation(GetRootConversationRequest) returns (GetRootConversationResponse);
  // GetProjectConfig returns the parsed project.critic configuration.
  rpc GetProjectConfig(GetProjectConfigRequest) returns (GetProjectConfigResponse);
  // CreateExplanation creates a new explanation (informal annotation) on a code line.
  rpc CreateExplanation(CreateExplanationRequest) returns (CreateExplanationResponse);
}

// ErrorCode represents the type of RPC error.
enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_INVALID_ARGUMENT = 1;
  ERROR_CODE_NOT_FOUND = 2;
  ERROR_CODE_INTERNAL = 3;
  ERROR_CODE_UNAVAILABLE = 4;
}

// RpcError represents a structured error response.
message RpcError {
  // code is the error type.
  ErrorCode code = 1;
  // message is the error message for logs.
  string message = 2;
  // details is an optional human-readable description.
  string details = 3;
}

// GetLastChangeRequest is an empty request for GetLastChange.
message GetLastChangeRequest {}

// GetLastChangeResponse contains the timestamp of the last change.
message GetLastChangeResponse {
  // mtime_msecs is the timestamp in milliseconds since Unix epoch.
  uint64 mtime_msecs = 1;
  // error contains error details if the request failed.
  RpcError error = 15;
}

// GetDiffSummaryRequest is an empty request for GetDiffSummary.
message GetDiffSummaryRequest {}

// GetDiffSummaryResponse contains the current state and diff summary from the session.
message GetDiffSummaryResponse {
  // state is the current session state ("INITIALISING" or "READY").
  string state = 1;
  // diff contains the file summaries without hunks (may be null if state is INITIALISING).
  DiffSummary diff = 2;
  // error contains error details if the request failed.
  RpcError error = 15;
}

// GetDiffRequest requests the full diff for a specific file.
message GetDiffRequest {
  // path is the file path to get the diff for.
  string path = 1;
  // context_lines is the number of context lines to show around changes.
  // Minimum and default is 3. Values less than 3 are treated as 3.
  int32 context_lines = 2;
}

// GetDiffResponse contains the full diff for a single file.
message GetDiffResponse {
  // file contains the full file diff with hunks.
  FileDiff file = 1;
  // error contains error details if the request failed.
  RpcError error = 15;
}

// DiffSummary represents a git diff summary with file metadata but no hunks.
message DiffSummary {
  repeated FileSummary files = 1;
}

// FileSummary represents metadata about a changed file (without hunks).
message FileSummary {
  string old_path = 1;
  string new_path = 2;
  string file_mode_old = 3;
  string file_mode_new = 4;
  FileStatus status = 5;
  bool is_binary = 6;
  // category is the file category name (e.g., "source", "test", "hidden") determined by project.critic config.
  string category = 7;
}

// Diff represents a git diff with multiple file changes.
message Diff {
  repeated FileDiff files = 1;
}

// FileStatus represents the status of a file in a diff.
enum FileStatus {
  FILE_STATUS_UNSPECIFIED = 0;
  FILE_STATUS_MODIFIED = 1;
  FILE_STATUS_NEW = 2;
  FILE_STATUS_DELETED = 3;
  FILE_STATUS_RENAMED = 4;
  FILE_STATUS_UNTRACKED = 5;
}

// FileDiff represents changes to a single file.
message FileDiff {
  string old_path = 1;
  string new_path = 2;
  string file_mode_old = 3;
  string file_mode_new = 4;
  FileStatus status = 5;
  bool is_binary = 6;
  repeated Hunk hunks = 7;
  // category is the file category name (e.g., "source", "test", "hidden") determined by project.critic config.
  string category = 8;
}

// Hunk represents a chunk of changes within a file.
message Hunk {
  int32 old_start = 1;
  int32 old_lines = 2;
  int32 new_start = 3;
  int32 new_lines = 4;
  string header = 5;
  repeated Line lines = 6;
  HunkStats stats = 7;
}

// HunkStats holds line statistics for a hunk.
message HunkStats {
  int32 added = 1;
  int32 deleted = 2;
}

// LineType represents the type of a line in a diff.
enum LineType {
  LINE_TYPE_UNSPECIFIED = 0;
  LINE_TYPE_CONTEXT = 1;
  LINE_TYPE_ADDED = 2;
  LINE_TYPE_DELETED = 3;
}

// Line represents a single line in a diff hunk.
message Line {
  LineType type = 1;
  string content = 2;
  int32 line_no_old = 3;
  int32 line_no_new = 4;
}

// GetFileRequest requests the content of a file.
message GetFileRequest {
  // path is the file path to read.
  string path = 1;
}

// GetFileResponse contains the file content.
message GetFileResponse {
  // content is the file content.
  string content = 1;
  // error contains error details if the request failed.
  RpcError error = 15;
}

// CreateConversationRequest contains the data for creating a new conversation.
message CreateConversationRequest {
  // old_file is the path to the file in the old version (before the change).
  string old_file = 1;
  // old_line is the line number in the old file.
  int32 old_line = 2;
  // new_file is the path to the file in the new version (after the change).
  string new_file = 3;
  // new_line is the line number in the new file.
  int32 new_line = 4;
  // comment is the markdown content of the comment.
  string comment = 5;
  // conversation_type specifies the type of conversation to create.
  // Defaults to CONVERSATION_TYPE_CONVERSATION if not set.
  ConversationType conversation_type = 6;
}

// CreateConversationResponse contains the result of creating a conversation.
message CreateConversationResponse {
  // success indicates whether the conversation was created successfully.
  bool success = 1;
  // error contains error details if the request failed.
  RpcError error = 15;
}

// GetConversationsRequest requests conversations matching the given filters.
message GetConversationsRequest {
  // paths filters to conversations in these files. Empty means all files.
  repeated string paths = 1;
  // statuses filters to conversations with these statuses. Empty means any status.
  repeated ConversationStatus statuses = 2;
}

// GetConversationsResponse contains all conversations for a file.
message GetConversationsResponse {
  // conversations is the list of conversation threads for the file.
  repeated Conversation conversations = 1;
  // error contains error details if the request failed.
  RpcError error = 15;
}

// GetConversationsSummaryRequest requests the summary of conversations across all files.
message GetConversationsSummaryRequest {}

// GetConversationsSummaryResponse contains conversation counts per file path.
message GetConversationsSummaryResponse {
  // summaries is the list of file conversation summaries (only files with conversations).
  repeated FileConversationSummary summaries = 1;
  // error contains error details if the request failed.
  RpcError error = 15;
}

// FileConversationSummary contains conversation statistics for a single file.
message FileConversationSummary {
  // file_path is the git-relative path to the file.
  string file_path = 1;
  // total_count is the total number of conversations for this file.
  int32 total_count = 2;
  // unresolved_count is the number of unresolved conversations.
  int32 unresolved_count = 3;
  // resolved_count is the number of resolved conversations.
  int32 resolved_count = 4;
  // has_unread_ai_messages indicates if there are unread AI messages.
  bool has_unread_ai_messages = 5;
  // explanation_count is the number of explanation (informal annotation) conversations.
  int32 explanation_count = 6;
  // category is the file category name (e.g., "source", "test", "hidden") determined by project.critic config.
  string category = 7;
}

// ConversationStatus represents the status of a conversation.
enum ConversationStatus {
  CONVERSATION_STATUS_INVALID = 0;
  CONVERSATION_STATUS_RESOLVED = 1;
  CONVERSATION_STATUS_UNRESOLVED = 2;
  CONVERSATION_STATUS_ACTIVE = 3;
  CONVERSATION_STATUS_WAITING_FOR_RESPONSE = 4;
  CONVERSATION_STATUS_INFORMAL = 5;
  CONVERSATION_STATUS_ARCHIVED = 6;
}

// ConversationType represents the type of a conversation.
enum ConversationType {
  CONVERSATION_TYPE_INVALID = 0;
  CONVERSATION_TYPE_CONVERSATION = 1;
  CONVERSATION_TYPE_EXPLANATION = 2;
}

// Conversation represents a comment thread at a specific line.
message Conversation {
  // id is the unique identifier for this conversation.
  string id = 1;
  // status is the conversation status.
  ConversationStatus status = 2;
  // file_path is the git-relative path to the file.
  string file_path = 3;
  // line_number is the line number in the file.
  int32 line_number = 4;
  // code_version is the git commit SHA when the comment was created.
  string code_version = 5;
  // context is the code context around the commented line.
  string context = 6;
  // messages is the list of messages in this conversation.
  repeated Message messages = 7;
  // created_at is the timestamp when the conversation was created.
  string created_at = 8;
  // updated_at is the timestamp when the conversation was last updated.
  string updated_at = 9;
  // conversation_type is the type of this conversation (conversation or explanation).
  ConversationType conversation_type = 10;
  // branch_name is the closest branch name at or following the code_version SHA.
  string branch_name = 11;
  // category is the file category name (e.g., "source", "test", "hidden") determined by project.critic config.
  string category = 12;
}

// Message represents a single message in a conversation.
message Message {
  // id is the unique identifier for this message.
  string id = 1;
  // author is who authored the message ("human" or "ai").
  string author = 2;
  // content is the message content.
  string content = 3;
  // created_at is the timestamp when the message was created.
  string created_at = 4;
  // updated_at is the timestamp when the message was last updated.
  string updated_at = 5;
  // is_unread indicates whether the message is unread (for AI messages).
  bool is_unread = 6;
}

// GetDiffBasesRequest is an empty request for GetDiffBases.
message GetDiffBasesRequest {}

// GetDiffBasesResponse contains the available diff bases and current range selection.
message GetDiffBasesResponse {
  // bases is the list of available diff base refs.
  repeated string bases = 1;
  // current_base is the currently selected diff base (deprecated, use current_start).
  string current_base = 2;
  // current_start is the start of the selected diff range.
  string current_start = 3;
  // current_end is the end of the selected diff range (empty means working directory).
  string current_end = 4;
  // error contains error details if the request failed.
  RpcError error = 15;
}

// SetDiffBaseRequest requests to change the current diff range.
message SetDiffBaseRequest {
  // base is the diff base ref to switch to (deprecated, use start).
  string base = 1;
  // start is the start of the diff range.
  string start = 2;
  // end is the end of the diff range (empty means working directory).
  string end = 3;
}

// SetDiffBaseResponse contains the result of setting the diff base.
message SetDiffBaseResponse {
  // success indicates whether the diff base was changed successfully.
  bool success = 1;
  // error contains error details if the request failed.
  RpcError error = 15;
}

// ReplyToConversationRequest contains the data for replying to an existing conversation.
message ReplyToConversationRequest {
  // conversation_id is the unique identifier of the conversation to reply to.
  string conversation_id = 1;
  // message is the markdown content of the reply.
  string message = 2;
}

// ReplyToConversationResponse contains the result of replying to a conversation.
message ReplyToConversationResponse {
  // success indicates whether the reply was added successfully.
  bool success = 1;
  // error contains error details if the request failed.
  RpcError error = 15;
}

// MarkConversationAsRequest updates the status of a conversation.
message MarkConversationAsRequest {
  // conversation_id is the unique identifier of the conversation to update.
  string conversation_id = 1;
  // status is the new status to set on the conversation.
  ConversationStatus status = 2;
}

// MarkConversationAsResponse contains the result of updating a conversation status.
message MarkConversationAsResponse {
  // error contains error details if the request failed.
  RpcError error = 15;
}

// WatchFileRequest tells the server to watch a specific file for changes.
message WatchFileRequest {
  // path is the file path to watch (relative to git root).
  // Empty string to stop watching.
  string path = 1;
}

// WatchFileResponse confirms the file watch was set up.
message WatchFileResponse {
  // error contains error details if the request failed.
  RpcError error = 15;
}

// GetRootConversationRequest is an empty request for GetRootConversation.
message GetRootConversationRequest {}

// GetRootConversationResponse contains the root conversation if it exists and is unresolved.
message GetRootConversationResponse {
  // conversation is the root conversation, if it exists and is unresolved.
  Conversation conversation = 1;
  // error contains error details if the request failed.
  RpcError error = 15;
}

// GetConfigRequest is an empty request for GetConfig.
message GetConfigRequest {}

// GetConfigResponse contains server configuration for the frontend.
message GetConfigResponse {
  // git_root is the absolute path to the git repository root.
  string git_root = 1;
  // dev_mode indicates whether the server is running in development mode.
  bool dev_mode = 2;
  // error contains error details if the request failed.
  RpcError error = 15;
}

// GetProjectConfigRequest is an empty request for GetProjectConfig.
message GetProjectConfigRequest {}

// GetProjectConfigResponse contains the parsed project.critic configuration.
message GetProjectConfigResponse {
  // project_name is the name of the project.
  string project_name = 1;
  // categories is the list of file categories with their glob patterns.
  repeated FileCategory categories = 2;
  // editor contains editor integration settings.
  EditorConfig editor = 3;
  // error contains error details if the request failed.
  RpcError error = 15;
}

// FileCategory represents a named file category with glob patterns.
message FileCategory {
  // name is the category name (e.g., "test", "hidden", "docs").
  string name = 1;
  // patterns is the list of gitignore-style glob patterns for this category.
  repeated string patterns = 2;
}

// EditorConfig holds editor integration settings.
message EditorConfig {
  // url is a template for opening files in an editor.
  // Supports placeholders: {file} for the file path, {line} for the line number.
  string url = 1;
}

// CreateExplanationRequest contains the data for creating a new explanation.
message CreateExplanationRequest {
  // file is the path to the file being annotated.
  string file = 1;
  // line is the line number in the file.
  int32 line = 2;
  // comment is the explanation text.
  string comment = 3;
}

// CreateExplanationResponse contains the result of creating an explanation.
message CreateExplanationResponse {
  // success indicates whether the explanation was created successfully.
  bool success = 1;
  // error contains error details if the request failed.
  RpcError error = 15;
}
